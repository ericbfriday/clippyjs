name = "cloudflare-workers-scraper"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "preview_kv_namespace_id"

[[d1_databases]]
binding = "DB"
database_name = "scraper_db"
database_id = "preview_database_id"

[ai]
binding = "AI"
